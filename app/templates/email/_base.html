<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#202124;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06);overflow:hidden;max-width:560px;width:100%;">
          <tr>
            <td style="background:#1a73e8;padding:20px 28px;color:#ffffff;font-size:18px;font-weight:600;letter-spacing:0.2px;">
              BlueScale
            </td>
          </tr>
          <tr>
            <td style="padding:28px 28px 8px 28px;font-size:20px;font-weight:600;line-height:1.3;color:#202124;">
              {{ title }}
            </td>
          </tr>
          <tr>
            <td style="padding:8px 28px 24px 28px;font-size:15px;line-height:1.55;color:#3c4043;">
              {% block content %}
                <p style="margin:0 0 12px 0;">{{ body }}</p>
              {% endblock %}
            </td>
          </tr>
          {% block cta %}{% endblock %}
          <tr>
            <td style="padding:20px 28px;border-top:1px solid #ebeef1;font-size:12px;line-height:1.5;color:#80868b;">
              You're receiving this email because of activity on your BlueScale account.
              Manage your notification preferences in the app settings.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
